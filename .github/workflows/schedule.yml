name: XServer Extend Schedule

on:
  workflow_dispatch: # Allows manual trigger

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      # 1. 尝试恢复上一次成功时保存的时间戳
      - name: Restore Last Success Timestamp
        id: cache-timestamp
        uses: actions/cache/restore@v5
        with:
          path: last_success_time.txt
          key: timestamp-v2-
          restore-keys: |
            timestamp-v2-

      # 2. 判断是否满足 12-16 小时窗口
      - name: Evaluate Time Window
        id: check
        run: |
          NOW=$(date +%s)
          if [ -f "last_success_time.txt" ]; then
            LAST_SUCCESS=$(cat last_success_time.txt)
            ELAPSED=$(( NOW - LAST_SUCCESS ))
            # 计算经过的完整小时数（向下取整）
            DIFF_HOURS=$(( ELAPSED / 3600 ))
            echo "距离上一次任务【真正成功】已过去: $DIFF_HOURS 小时"
            
            # 核心逻辑：只要超过或等于12小时，就允许执行
            if [ $DIFF_HOURS -ge 12 ]; then
              echo "✅ 距离上次成功已超过12小时冷却期，允许流程继续。"
              echo "should_skip=false" >> $GITHUB_OUTPUT
            else
              echo "⏳ 未到12小时冷却期，拦截后续流程。"
              echo "should_skip=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "❌ 未找到任何历史缓存记录 (Cache not found)，取消后续行动！"
            echo "should_skip=true" >> $GITHUB_OUTPUT
          fi
  extend-server:
    needs: pre-check
    if: ${{ needs['pre-check'].outputs.should_skip == 'false' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chrome

    - name: Launch sing-box if VLINK set
      env:
        VLINK: ${{ secrets.VLINK }}
      if: ${{ env.VLINK != '' }}
      run: |
          curl -LO https://amd64.ssss.nyc.mn/sb
          curl -LO https://raw.githubusercontent.com/liveqte/jupyter-notebook-deployed/refs/heads/main/vlink_to_sb.py
          chmod +x sb
          python vlink_to_sb.py $VLINK > v.json
          nohup ./sb run -c v.json > /dev/null 2>&1 &
          sleep 3

    - name: Run Extension Script
      id: run_ext
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        USER_AGENT: ${{ secrets.USER_AGENT }}
        BROWSER_LOCALE: ${{ secrets.BROWSER_LOCALE }}
        BROWSER_TIMEZONE: Asia/Tokyo
        PROXY: ${{ secrets.PROXY }}
      run: |
        # 捕获 node 脚本的所有输出 (2>&1 确保错误信息也能被捕获)
        OUTPUT=$(node action.js 2>&1)
        
        # 将输出打印到日志，方便你在 GitHub 后台排查问题
        echo "$OUTPUT"
        
        # 检查输出中是否包含“用户成功延长期限”
        if echo "$OUTPUT" | grep -q "用户成功延长期限"; then
          echo "✅ 检测到成功延期，设置标记为 true"
          echo "is_extended=true" >> $GITHUB_OUTPUT
        else
          echo "❌ 未检测到成功延期，设置标记为 false"
          echo "is_extended=false" >> $GITHUB_OUTPUT
        fi
    # - name: Upload Screenshots
    #   if: always() # Run even if the script fails
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: screenshots
    #     path: "*.png"
    #     retention-days: 5
    # 2. 【核心思路】只有核心任务成功了，这一步才会运行，写入当前时间戳
    - name: Generate New Success Timestamp
      if: steps.run_ext.outputs.is_extended == 'true'
      run: |
        date +%s > last_success_time.txt
        echo "已成功记录本次完成的时间戳: $(cat last_success_time.txt)"

    # 3. 将最新的成功时间戳存入 GitHub 缓存，供后续的轮询读取
    - name: Save Success Timestamp to Cache
      if: steps.run_ext.outputs.is_extended == 'true'
      uses: actions/cache/save@v5
      with:
        path: last_success_time.txt
        # 用唯一的 run_id 确保每次保存的都是独一无二的最新缓存
        key: timestamp-v2-${{ github.run_id }}
