name: XServer Extend Schedule

on:
  schedule:
    - cron: '0 0 * * *' # Runs every 24 hours at 00:00 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  extend-server:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chrome

    - name: Launch sing-box if VLINK set
      env:
        VLINK: ${{ secrets.VLINK }}
      if: ${{ env.VLINK != '' }}
      run: |
          curl -LO https://amd64.ssss.nyc.mn/sb
          curl -LO https://raw.githubusercontent.com/liveqte/jupyter-notebook-deployed/refs/heads/main/vlink_to_sb.py
          chmod +x sb
          python vlink_to_sb.py $VLINK > v.json
          nohup ./sb run -c v.json > /dev/null 2>&1 &
          sleep 3

    - name: Run Extension Script
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        PROXY: ${{ secrets.PROXY }}
      run: node action.js

    - name: Upload Screenshots
      if: always() # Run even if the script fails
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: "*.png"
        retention-days: 5
